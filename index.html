<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPO SMART DIGITAL JOB NETWORK | 100% MEGA VISION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --glow: #00d4ff; --bg: #010409; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; }
        .mega-glass { background: rgba(25, 30, 40, 0.9); backdrop-filter: blur(20px); border: 1px solid #30363d; }
        .job-card { border-right: 4px solid var(--glow); transition: 0.4s; }
        .job-card:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
        .search-bar:focus { border-color: var(--glow); box-shadow: 0 0 10px var(--glow); }
    </style>
</head>
<body>
    <header class="py-10 px-4 text-center mega-glass sticky top-0 z-50">
        <h1 class="text-5xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">SPO SMART DIGITAL VERSE</h1>
        <p class="mt-2 text-gray-400">پاکستان کا سب سے بڑا ڈیجیٹل جاب نیٹ ورک</p>
        
        <div class="max-w-5xl mx-auto mt-8 grid grid-cols-1 md:grid-cols-3 gap-4">
            <input type="text" id="megaSearch" placeholder="محکمہ یا جاب کا نام..." class="col-span-2 p-4 rounded-xl bg-black border border-gray-700 search-bar text-right outline-none">
            <select id="provFilter" class="p-4 rounded-xl bg-black border border-gray-700 outline-none">
                <option value="">تمام صوبے</option>
                <option value="Punjab">پنجاب</option>
                <option value="Federal">فیڈرل</option>
                <option value="Sindh">سندھ</option>
            </select>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div id="stats" class="mb-6 text-cyan-400 font-bold uppercase tracking-widest"></div>
        <div id="megaGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <script>
        const API = "https://raw.githubusercontent.com/masif6584-ai/spo-job-network/main/jobs.json";
        let masterData = [];

        async function loadSPO() {
            const res = await fetch(API);
            masterData = await res.json();
            render(masterData);
        }

        function render(data) {
            const grid = document.getElementById('megaGrid');
            document.getElementById('stats').innerText = `دستیاب نوکریاں: ${data.length}`;
            grid.innerHTML = data.map(j => `
                <div class="mega-glass p-6 rounded-2xl job-card">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs bg-cyan-900 text-cyan-300 px-3 py-1 rounded-full">${j.loc}</span>
                        <span class="text-xs text-gray-500">${j.date}</span>
                    </div>
                    <h2 class="text-xl font-bold mb-4 text-white">${j.title}</h2>
                    <div class="text-sm text-gray-400 mb-6 space-y-2">
                        <p>🏦 محکمہ: ${j.dept}</p>
                        <p>🎓 تعلیم: ${j.edu}</p>
                    </div>
                    <a href="https://wa.me/923034480404?text=SPO Mega Vision: I want to apply for ${j.title}" 
                       class="block w-full py-3 bg-gradient-to-r from-cyan-600 to-blue-700 text-center font-bold rounded-xl hover:opacity-90 transition shadow-lg">
                       اپلائی کے لیے رابطہ کریں
                    </a>
                </div>
            `).join('');
        }

        document.getElementById('megaSearch').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            render(masterData.filter(x => x.title.toLowerCase().includes(term) || x.dept.toLowerCase().includes(term)));
        };

        document.getElementById('provFilter').onchange = (e) => {
            const val = e.target.value;
            render(val ? masterData.filter(x => x.loc === val) : masterData);
        };

        loadSPO();
    </script>
</body>
</html>
