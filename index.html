<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SPO SMART DIGITAL JOB NETWORK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(56, 189, 248, 0.2); transition: 0.4s; }
        .glass-card:hover { border-color: #38bdf8; transform: scale(1.02); }
    </style>
</head>
<body class="p-5">
    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-16">
            <h1 class="text-5xl font-black text-cyan-400 mb-4">SPO SMART DIGITAL VERSE</h1>
            <p class="text-xl text-cyan-100">"آپ کی ہر ضرورت کا ایک ہی جگہ حل"</p>
        </header>

        <div id="job-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </div>

    <script>
        const API_URL = "https://raw.githubusercontent.com/masif6584-ai/spo-job-network/main/jobs.json";
        async function loadMegaJobs() {
            const grid = document.getElementById('job-grid');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                grid.innerHTML = data.map(job => `
                    <div class="glass-card p-8 rounded-3xl text-right">
                        <h2 class="text-2xl font-bold text-white mb-4">${job.title}</h2>
                        <p class="text-gray-400 mb-6">🏛️ محکمہ: ${job.dept} | 🎓 تعلیم: ${job.edu}</p>
                        <a href="https://wa.me/923034480404?text=I want to apply for ${job.title}" 
                           class="block text-center bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-xl">
                           SPO کے ذریعے اپلائی کریں
                        </a>
                    </div>
                `).join('');
            } catch (e) { grid.innerHTML = "<p>جابز لوڈ ہو رہی ہیں...</p>"; }
        }
        loadMegaJobs();
    </script>
</body>
</html>
